###############################################
# DrLex - Stack para Portainer (Docker Swarm)
# Rede: wapify (overlay)
# Traefik: v3.4 (traefik_traefik)
# Dominio: drlex.wapify.com.br
###############################################

version: '3.8'

services:
  drlex_api:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm ci --omit=dev 2>/dev/null || npm install --omit=dev && node src/index.js"
    volumes:
      - /var/data/drlex/app:/app
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - DATABASE_URL=postgresql://drlex:${DB_PASSWORD:-drlex_secret}@drlex_postgres:5432/drlex
      - REDIS_URL=redis://drlex_redis:6379
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-https://api.wapify.com.br}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-drlex}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - wapify
      - drlex_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.drlex.rule=Host(`drlex.wapify.com.br`)"
        - "traefik.http.routers.drlex.entrypoints=websecure"
        - "traefik.http.routers.drlex.tls=true"
        - "traefik.http.routers.drlex.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.drlex.loadbalancer.server.port=3000"

  drlex_postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: drlex
      POSTGRES_USER: drlex
      POSTGRES_PASSWORD: ${DB_PASSWORD:-drlex_secret}
    volumes:
      - drlex_pgdata:/var/lib/postgresql/data
    networks:
      - drlex_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  drlex_redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - drlex_redisdata:/data
    networks:
      - drlex_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  drlex_pgdata:
    driver: local
  drlex_redisdata:
    driver: local

networks:
  wapify:
    external: true
  drlex_internal:
    driver: overlay
