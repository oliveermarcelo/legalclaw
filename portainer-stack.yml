###############################################
# DrLex - Stack para Portainer
# Rede da Evolution API: wapify
# Evolution URL: https://api.wapify.com.br
###############################################

version: '3.8'

services:
  drlex-api:
    image: node:18-alpine
    container_name: drlex-api
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm ci --omit=dev 2>/dev/null || npm install --omit=dev && node src/index.js"
    ports:
      - "3000:3000"
    volumes:
      - /var/data/drlex/app:/app
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - DATABASE_URL=postgresql://drlex:${DB_PASSWORD:-drlex_secret}@drlex-postgres:5432/drlex
      - REDIS_URL=redis://drlex-redis:6379
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-https://api.wapify.com.br}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-drlex}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      drlex-postgres:
        condition: service_healthy
      drlex-redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - drlex-net
      - evolution-net

  drlex-postgres:
    image: postgres:15-alpine
    container_name: drlex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: drlex
      POSTGRES_USER: drlex
      POSTGRES_PASSWORD: ${DB_PASSWORD:-drlex_secret}
    volumes:
      - drlex-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drlex"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - drlex-net

  drlex-redis:
    image: redis:7-alpine
    container_name: drlex-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - drlex-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - drlex-net

volumes:
  drlex-pgdata:
    driver: local
  drlex-redisdata:
    driver: local

networks:
  drlex-net:
    driver: bridge
  evolution-net:
    external: true
    name: wapify
