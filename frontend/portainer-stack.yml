version: '3.8'

services:
  drlex_api:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm ci --omit=dev 2>/dev/null || npm install --omit=dev && node src/index.js"
    volumes:
      - /var/data/drlex/app:/app
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - DATABASE_URL=postgresql://drlex:${DB_PASSWORD:-drlex_secret}@drlex_postgres:5432/drlex
      - REDIS_URL=redis://drlex_redis:6379
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-https://api.wapify.com.br}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-drlex}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - wapify
      - drlex_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=wapify"
        - "traefik.http.routers.drlex-api.rule=Host(`drlex.wapify.com.br`) && (PathPrefix(`/api`) || PathPrefix(`/health`) || PathPrefix(`/webhooks`))"
        - "traefik.http.routers.drlex-api.entrypoints=websecure"
        - "traefik.http.routers.drlex-api.service=drlex-api"
        - "traefik.http.routers.drlex-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.drlex-api.priority=2"
        - "traefik.http.services.drlex-api.loadbalancer.server.port=3000"
        - "traefik.http.services.drlex-api.loadbalancer.passHostHeader=1"

  drlex_frontend:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm run start"
    volumes:
      - /var/data/drlex/frontend:/app
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=https://drlex.wapify.com.br
    networks:
      - wapify
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 15s
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=wapify"
        - "traefik.http.routers.drlex-front.rule=Host(`drlex.wapify.com.br`)"
        - "traefik.http.routers.drlex-front.entrypoints=websecure"
        - "traefik.http.routers.drlex-front.service=drlex-front"
        - "traefik.http.routers.drlex-front.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.drlex-front.priority=1"
        - "traefik.http.services.drlex-front.loadbalancer.server.port=3001"
        - "traefik.http.services.drlex-front.loadbalancer.passHostHeader=1"

  drlex_worker:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm ci --omit=dev 2>/dev/null || npm install --omit=dev && node src/worker.js"
    volumes:
      - /var/data/drlex/app:/app
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - DATABASE_URL=postgresql://drlex:${DB_PASSWORD:-drlex_secret}@drlex_postgres:5432/drlex
      - REDIS_URL=redis://drlex_redis:6379
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-https://api.wapify.com.br}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-drlex}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - wapify
      - drlex_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s

  drlex_postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: drlex
      POSTGRES_USER: drlex
      POSTGRES_PASSWORD: ${DB_PASSWORD:-drlex_secret}
    volumes:
      - drlex_pgdata:/var/lib/postgresql/data
    networks:
      - drlex_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  drlex_redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - drlex_redisdata:/data
    networks:
      - drlex_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  drlex_pgdata:
    driver: local
  drlex_redisdata:
    driver: local

networks:
  wapify:
    external: true
  drlex_internal:
    driver: overlay
