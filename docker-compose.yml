version: '3.8'

services:
  drlex-api:
    build: .
    container_name: drlex-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - drlex-net
      - evolution-net  # Conectar com a rede da Evolution API

  drlex-worker:
    build: .
    container_name: drlex-worker
    restart: unless-stopped
    command: node src/worker.js
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - drlex-net
      - evolution-net

  postgres:
    image: postgres:15-alpine
    container_name: drlex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: drlex
      POSTGRES_USER: drlex
      POSTGRES_PASSWORD: drlex_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drlex"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - drlex-net

  redis:
    image: redis:7-alpine
    container_name: drlex-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    networks:
      - drlex-net

volumes:
  pgdata:
  redisdata:

networks:
  drlex-net:
    driver: bridge
  evolution-net:
    external: true
    name: wapify
