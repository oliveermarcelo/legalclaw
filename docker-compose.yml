version: '3.8'

services:
  # Aplicação principal
  legalclaw:
    build: .
    container_name: legalclaw-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://legalclaw:${DB_PASSWORD}@postgres:5432/legalclaw
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - legalclaw-network

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: legalclaw-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=legalclaw
      - POSTGRES_USER=legalclaw
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - legalclaw-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: legalclaw-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - legalclaw-network

  # Nginx (opcional - para produção)
  nginx:
    image: nginx:alpine
    container_name: legalclaw-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - legalclaw
    networks:
      - legalclaw-network

  # Dashboard (opcional)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: legalclaw-dashboard
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://legalclaw:3000
    depends_on:
      - legalclaw
    networks:
      - legalclaw-network

volumes:
  postgres-data:
  redis-data:

networks:
  legalclaw-network:
    driver: bridge
